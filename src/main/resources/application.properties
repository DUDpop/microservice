spring.application.name=microservice

# -----------------------------
# Database (PostgreSQL)
# -----------------------------
# Убедитесь, что создана БД: CREATE DATABASE microservice;
# При ошибке подключения проверьте хост/порт, имя БД, логин и пароль пользователя PostgreSQL.
# Можно переопределять через переменные окружения:
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/microservice}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------
# Liquibase migrations
# -----------------------------
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# Hibernate не должен сам создавать схему (это делает Liquibase).
spring.jpa.hibernate.ddl-auto=validate

# -----------------------------
# Encoding
# -----------------------------
spring.messages.encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# -----------------------------
# OpenAPI / Swagger UI
# -----------------------------
springdoc.swagger-ui.path=/swagger-ui.html

# Внешний порт сервера.
# По умолчанию Spring Boot использует 8080, но у вас он занят (PlanetVPNHelper),
# поэтому меняем на 8081, чтобы видеть результат.
server.port=8081
